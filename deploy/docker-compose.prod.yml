# Hardened production compose. Image is built+pushed by CI (deploy.sh pins a
# :sha-<short> tag). The SQLite cache lives on a host volume seeded by the
# refresh job; the root FS is read-only with the data dir writable for WAL.
services:
  app:
    image: ghcr.io/OWNER/franklin-housing:latest
    restart: unless-stopped
    init: true
    read_only: true
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    tmpfs:
      - /tmp
    environment:
      FH_DB_PATH: /data/webapp.sqlite
      FH_SPA_DIR: frontend/dist
      FH_AUTH_SECRET: ${FH_AUTH_SECRET:?set FH_AUTH_SECRET in .env}
      FH_CORS_ORIGINS: ${FH_CORS_ORIGINS:-*}
      FH_RATE_LIMIT: ${FH_RATE_LIMIT:-120/minute}
    volumes:
      - ./data:/data        # chown 1000:1000 on the host; holds webapp.sqlite + WAL
    ports:
      - "127.0.0.1:8000:8000"   # front with a TLS reverse proxy (Traefik/Caddy/nginx)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health').read() else 1)"]
      interval: 30s
      timeout: 4s
      retries: 3
